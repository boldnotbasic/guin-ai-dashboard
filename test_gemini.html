<!DOCTYPE html>
<html>
<head>
    <title>Gemini API Test</title>
</head>
<body>
    <h1>Gemini API Model Test</h1>
    <button onclick="testModels()">Test Available Models</button>
    <button onclick="testGenerate()">Test Generate Content</button>
    <pre id="output"></pre>

    <script>
        const API_KEY = 'AIzaSyDpMjJjuJSBBNpPwzJXMJdMqw-0I';
        
        async function testModels() {
            const output = document.getElementById('output');
            output.textContent = 'Fetching available models...\n';
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
                const data = await response.json();
                
                output.textContent += '\n=== Available Models ===\n';
                if (data.models) {
                    data.models.forEach(model => {
                        if (model.supportedGenerationMethods?.includes('generateContent')) {
                            output.textContent += `\n✅ ${model.name}\n`;
                            output.textContent += `   Methods: ${model.supportedGenerationMethods.join(', ')}\n`;
                        }
                    });
                } else {
                    output.textContent += JSON.stringify(data, null, 2);
                }
            } catch (error) {
                output.textContent += '\nError: ' + error.message;
            }
        }

        async function testGenerate() {
            const output = document.getElementById('output');
            output.textContent = 'Testing generateContent...\n';
            
            // Try different model names
            const modelsToTry = [
                'models/gemini-pro',
                'models/gemini-1.5-flash',
                'models/gemini-1.5-pro',
                'gemini-pro',
                'gemini-1.5-flash'
            ];
            
            for (const modelName of modelsToTry) {
                output.textContent += `\nTrying: ${modelName}...\n`;
                
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${API_KEY}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [{ text: 'Zeg hallo in het Nederlands' }]
                                }]
                            })
                        }
                    );
                    
                    const data = await response.json();
                    
                    if (response.ok && data.candidates) {
                        output.textContent += `✅ SUCCESS with ${modelName}!\n`;
                        output.textContent += `Response: ${data.candidates[0]?.content?.parts?.[0]?.text}\n`;
                        output.textContent += `\n=== USE THIS MODEL: ${modelName} ===\n`;
                        break;
                    } else {
                        output.textContent += `❌ Failed: ${data.error?.message || 'Unknown error'}\n`;
                    }
                } catch (error) {
                    output.textContent += `❌ Error: ${error.message}\n`;
                }
            }
        }
    </script>
</body>
</html>
